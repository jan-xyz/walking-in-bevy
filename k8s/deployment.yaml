apiVersion: apps/v1
kind: Deployment
metadata:
  name: walking-in-bevy-server
  labels:
    app.kubernetes.io/name: walking-in-bevy-server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: walking-in-bevy-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: walking-in-bevy-server
    spec:
      terminationGracePeriodSeconds: 5
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: walking-in-bevy-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: game-udp
              containerPort: 5000
              protocol: UDP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 32Mi
            limits:
              cpu: 1000m
              memory: 512Mi
              ephemeral-storage: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
