name: Server Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "k8s/**"
      - ".github/workflows/server-build-and-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: server-build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next server version and create tag
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l "server-v*" | sed 's/^server-//' | sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_TAG="server-${NEW_VERSION}"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New server version: $NEW_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/walking-in-bevy-server:${{ steps.version.outputs.new_version }}
            ghcr.io/${{ github.repository_owner }}/walking-in-bevy-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Update Kustomization image tag
        run: |
          git pull --rebase origin main
          cd k8s
          kustomize edit set image walking-in-bevy-server=ghcr.io/${{ github.repository_owner }}/walking-in-bevy-server:${{ steps.version.outputs.new_version }}
          cd ..
          git add k8s/kustomization.yaml
          git commit -m "Update server image to ${{ steps.version.outputs.new_version }}" || true
          git push origin main

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config
          kubectl apply -k k8s/
